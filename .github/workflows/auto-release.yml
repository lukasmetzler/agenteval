name: Auto Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if VERSION changed
        id: check
        run: |
          VERSION=$(cat VERSION)
          if git diff HEAD~1 --name-only | grep -q "^VERSION$"; then
            if git tag -l "v$VERSION" | grep -q "v$VERSION"; then
              echo "Tag v$VERSION already exists, skipping"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            else
              echo "VERSION changed to $VERSION, triggering release"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "VERSION not changed, skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: agenteval-linux-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: agenteval-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: agenteval-darwin-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Build binary
        run: ./scripts/build.sh --target=${{ matrix.target }} --outfile=${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          files: |
            agenteval-linux-x64/agenteval-linux-x64
            agenteval-darwin-arm64/agenteval-darwin-arm64
            agenteval-darwin-x64/agenteval-darwin-x64
          generate_release_notes: true
