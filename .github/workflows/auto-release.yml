name: Auto Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if VERSION changed
        id: check
        run: |
          VERSION=$(cat VERSION)
          if git diff HEAD~1 --name-only | grep -q "^VERSION$"; then
            if git tag -l "v$VERSION" | grep -q "v$VERSION"; then
              echo "Tag v$VERSION already exists, skipping"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            else
              echo "VERSION changed to $VERSION, triggering release"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "VERSION not changed, skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: agenteval-linux-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: agenteval-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: agenteval-darwin-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run test

      - name: Build binary
        run: ./scripts/build.sh --target=${{ matrix.target }} --outfile=${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          files: |
            agenteval-linux-x64/agenteval-linux-x64
            agenteval-darwin-arm64/agenteval-darwin-arm64
            agenteval-darwin-x64/agenteval-darwin-x64
          generate_release_notes: true

      # --- Publish to npm ---
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          cd npm
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" package.json
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- Update Homebrew tap ---
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ needs.check-version.outputs.version }}

          # Compute SHA256 for each binary
          SHA_DARWIN_ARM64=$(sha256sum agenteval-darwin-arm64/agenteval-darwin-arm64 | cut -d' ' -f1)
          SHA_DARWIN_X64=$(sha256sum agenteval-darwin-x64/agenteval-darwin-x64 | cut -d' ' -f1)
          SHA_LINUX_X64=$(sha256sum agenteval-linux-x64/agenteval-linux-x64 | cut -d' ' -f1)

          # Clone tap repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/lukasmetzler/homebrew-agenteval.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Formula/agenteval.rb << FORMULA
          class Agenteval < Formula
            desc "Lint, benchmark, and CI gate for AI coding instructions"
            homepage "https://github.com/lukasmetzler/agenteval"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/lukasmetzler/agenteval/releases/download/v#{version}/agenteval-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/lukasmetzler/agenteval/releases/download/v#{version}/agenteval-darwin-x64"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              url "https://github.com/lukasmetzler/agenteval/releases/download/v#{version}/agenteval-linux-x64"
              sha256 "${SHA_LINUX_X64}"
            end

            def install
              binary = Dir["agenteval-*"].first || "agenteval"
              bin.install binary => "agenteval"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/agenteval --version")
            end
          end
          FORMULA
          sed -i 's/^          //' Formula/agenteval.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agenteval.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update agenteval to ${VERSION}"
          git push
