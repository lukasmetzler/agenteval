name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint:ci

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build binary
        run: bun build src/cli.ts --compile --outfile=agenteval

      - name: Smoke test
        run: ./agenteval --version
