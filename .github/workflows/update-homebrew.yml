name: Update Homebrew

on:
  release:
    types: [published]

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets
        run: sleep 30

      - name: Download binaries and compute checksums
        id: checksums
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION_NUM="${VERSION#v}"

          for binary in agenteval-darwin-arm64 agenteval-darwin-x64 agenteval-linux-x64; do
            gh release download "$VERSION" --repo lukasmetzler/agenteval --pattern "$binary" --output "$binary"
            SHA=$(sha256sum "$binary" | cut -d' ' -f1)
            KEY=$(echo "$binary" | tr '-' '_')
            echo "${KEY}_sha256=$SHA" >> "$GITHUB_OUTPUT"
          done
          echo "version=$VERSION_NUM" >> "$GITHUB_OUTPUT"

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: lukasmetzler/homebrew-agenteval
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          cat > Formula/agenteval.rb << 'FORMULA'
          class Agenteval < Formula
            desc "Lint, benchmark, and CI gate for AI coding instructions"
            homepage "https://github.com/lukasmetzler/agenteval"
            version "${{ steps.checksums.outputs.version }}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/lukasmetzler/agenteval/releases/download/v#{version}/agenteval-darwin-arm64"
                sha256 "${{ steps.checksums.outputs.agenteval_darwin_arm64_sha256 }}"
              else
                url "https://github.com/lukasmetzler/agenteval/releases/download/v#{version}/agenteval-darwin-x64"
                sha256 "${{ steps.checksums.outputs.agenteval_darwin_x64_sha256 }}"
              end
            end

            on_linux do
              url "https://github.com/lukasmetzler/agenteval/releases/download/v#{version}/agenteval-linux-x64"
              sha256 "${{ steps.checksums.outputs.agenteval_linux_x64_sha256 }}"
            end

            def install
              binary = Dir["agenteval-*"].first || "agenteval"
              bin.install binary => "agenteval"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/agenteval --version")
            end
          end
          FORMULA
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/agenteval.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agenteval.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update agenteval to ${{ steps.checksums.outputs.version }}"
          git push
