name: "agenteval"
description: "Lint, benchmark, and CI gate for AI coding instructions"
author: "Lukas Metzler"

branding:
  icon: "check-circle"
  color: "green"

inputs:
  command:
    description: "agenteval command to run (e.g. lint, ci, harvest --dry-run)"
    required: false
    default: "lint"
  args:
    description: "Additional arguments passed to the command"
    required: false
    default: ""
  version:
    description: "agenteval version to install (default: latest)"
    required: false
    default: "latest"

runs:
  using: "composite"
  steps:
    - name: Detect platform
      id: platform
      shell: bash
      run: |
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$OS" in
          linux)  PLATFORM="linux" ;;
          darwin) PLATFORM="darwin" ;;
          *)      echo "::error::Unsupported OS: $OS"; exit 1 ;;
        esac
        case "$ARCH" in
          x86_64|amd64) ARCH="x64" ;;
          arm64|aarch64) ARCH="arm64" ;;
          *)             echo "::error::Unsupported arch: $ARCH"; exit 1 ;;
        esac
        echo "binary=agenteval-${PLATFORM}-${ARCH}" >> "$GITHUB_OUTPUT"

    - name: Install agenteval
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "latest" ]; then
          VERSION=$(curl -fsSL "https://api.github.com/repos/lukasmetzler/agenteval/releases/latest" | sed -n 's/.*"tag_name":"\([^"]*\)".*/\1/p')
        else
          VERSION="v${{ inputs.version }}"
        fi
        URL="https://github.com/lukasmetzler/agenteval/releases/download/${VERSION}/${{ steps.platform.outputs.binary }}"
        echo "::group::Installing agenteval ${VERSION}"
        curl -fsSL "$URL" -o /usr/local/bin/agenteval
        chmod +x /usr/local/bin/agenteval
        agenteval --version
        echo "::endgroup::"

    - name: Run agenteval
      shell: bash
      run: agenteval ${{ inputs.command }} ${{ inputs.args }}
