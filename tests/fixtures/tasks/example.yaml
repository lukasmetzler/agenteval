name: example-refactor
description: "Refactor logging to use structured logger"
prompt: "Replace all console.log calls in src/ with logger.info from src/utils/logger.ts"
harness: auto
timeout: 120

assertions:
  - type: files-changed
    pattern: "src/**/*.ts"
    expect: modified
  - type: test-pass
    command: "bun test"
  - type: convention
    pattern: "logger\\.info|logger\\.warn|logger\\.error"
    expect: present-in-changes

scoring:
  correctness: 0.4
  precision: 0.3
  efficiency: 0.2
  conventions: 0.1
